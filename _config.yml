theme: jekyll-theme-slate

title: FCC-ee Physics Studies
description: FCC-ee Physics Groups and Studies
theme: minima

markdown: kramdown
kramdown:
  auto_ids: true
  toc_levels: 1..3

collections:
  phys-groups:
    output: true
    permalink: /phys-groups/:path/

defaults:
  - scope:
      path: "phys-groups"
      type: phys-groups
    values:
      layout: phys-group

exclude:
  - README.md
